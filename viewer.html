<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UCI Lab Navegador</title>
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>
  <div id="printHeader" class="print-header"></div>
  <header class="topbar">
    <div class="viewer-title">
      UCI Lab Navegador – Visualizador Clínico
    </div>
    <div class="row">
      <div class="group">
        <label>Paciente</label>
        <select id="selPaciente"></select>
      </div>

      <div class="group">
        <label>RUT</label>
        <input id="txtRut" placeholder="11222333-K" />
        <button id="btnCargar">Cargar</button>
      </div>

      <div class="spacer"></div>

<div class="group actions">
  <button id="btnActualizar">Actualizar</button>
  <button id="btnResumenInfeccioso">Resumen infeccioso</button>
  <button id="btnExportarJSON">Exportar JSON</button>
  <button id="btnImportarJSON">Importar JSON</button>
  <button id="btnExportarCSV">Exportar CSV</button>
  <button id="btnImprimir">Imprimir</button>
  <button id="btnBorrar" class="danger">Borrar</button>
  <input id="fileImportarJSON" type="file" accept=".json,application/json" hidden />
</div>
    </div>

    <div class="row info" id="infoPaciente"></div>

    <details class="filters">
      <summary>Filtros</summary>
      <div class="row">
        <div class="group">
          <label>Buscar examen</label>
          <input id="txtBuscarExamen" placeholder="Na, PCR, Lactato..." />
        </div>

        <label class="chk">
          <input type="checkbox" id="chkOcultarVacios" checked />
          Ocultar filas vacías
        </label>

        <label class="chk">
          <input type="checkbox" id="chkMostrarExtras" checked />
          Mostrar exámenes extra
        </label>
      </div>
    </details>
  </header>

  <main>
    <div id="estado" class="estado"></div>
    <div id="tablaWrap" class="table-wrap"></div>
  </main>

<footer class="app-footer">
  <p>UCI Lab Navegador <span id="appVersion"></span> · Proyecto desarrollado por Dr. Juan Sepúlveda Sepúlveda</p>
</footer>

  <!-- libs existentes -->
  <script src="exams.js"></script>
  <script src="storage.js"></script>
  <script src="cultures.js"></script>
  <script src="matrix.js"></script>
  <script src="export.js"></script>

  <!-- UI -->
  <script src="viewer.js"></script>
</body>
</html>
